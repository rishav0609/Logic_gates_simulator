<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Gate Simulator</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/gates.css">
    <link rel="stylesheet" href="css/wires.css">
    <link rel="stylesheet" href="css/truthtable.css">
</head>
<body>
    <header id="toolbar">
        <h1>Logic Gate Simulator</h1>
        <div class="toolbar-buttons">
            <button id="btn-clear">Clear</button>
            <button id="btn-save">Save</button>
            <button id="btn-load">Load</button>
            <button id="btn-export">Export</button>
        </div>
    </header>

    <main id="main-layout">
        <aside id="sidebar">
            <h2>Gate Palette</h2>
            <div id="gate-palette">
                <div class="palette-chip" draggable="true" data-gate-type="INPUT">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="12" fill="none" stroke="var(--accent)" stroke-width="2"/>
                        <text x="20" y="25" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="bold">I</text>
                    </svg>
                    <span>INPUT</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="OUTPUT">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="12" fill="none" stroke="var(--accent)" stroke-width="2"/>
                        <text x="20" y="25" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="bold">O</text>
                    </svg>
                    <span>OUTPUT</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="AND">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <path d="M 10 12 L 20 12 Q 30 12 30 20 Q 30 28 20 28 L 10 28 Z" fill="none" stroke="var(--accent)" stroke-width="2"/>
                    </svg>
                    <span>AND</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="OR">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <path d="M 10 12 Q 15 12 20 20 Q 15 28 10 28 Q 12 20 10 12 M 20 20 Q 28 12 32 20 Q 28 28 20 20" fill="none" stroke="var(--accent)" stroke-width="2"/>
                    </svg>
                    <span>OR</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="NOT">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <path d="M 12 14 L 12 26 L 26 20 Z" fill="none" stroke="var(--accent)" stroke-width="2"/>
                        <circle cx="28" cy="20" r="2" fill="none" stroke="var(--accent)" stroke-width="2"/>
                    </svg>
                    <span>NOT</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="NAND">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <path d="M 8 12 L 18 12 Q 28 12 28 20 Q 28 28 18 28 L 8 28 Z" fill="none" stroke="var(--accent)" stroke-width="2"/>
                        <circle cx="30" cy="20" r="2" fill="none" stroke="var(--accent)" stroke-width="2"/>
                    </svg>
                    <span>NAND</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="NOR">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <path d="M 8 12 Q 13 12 18 20 Q 13 28 8 28 Q 10 20 8 12 M 18 20 Q 26 12 28 20 Q 26 28 18 20" fill="none" stroke="var(--accent)" stroke-width="2"/>
                        <circle cx="30" cy="20" r="2" fill="none" stroke="var(--accent)" stroke-width="2"/>
                    </svg>
                    <span>NOR</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="XOR">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <path d="M 8 12 Q 10 20 8 28 M 12 12 Q 17 12 22 20 Q 17 28 12 28 Q 14 20 12 12 M 22 20 Q 30 12 34 20 Q 30 28 22 20" fill="none" stroke="var(--accent)" stroke-width="2"/>
                    </svg>
                    <span>XOR</span>
                </div>
                <div class="palette-chip" draggable="true" data-gate-type="XNOR">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <path d="M 6 12 Q 8 20 6 28 M 10 12 Q 15 12 20 20 Q 15 28 10 28 Q 12 20 10 12 M 20 20 Q 26 12 28 20 Q 26 28 20 20" fill="none" stroke="var(--accent)" stroke-width="2"/>
                        <circle cx="30" cy="20" r="2" fill="none" stroke="var(--accent)" stroke-width="2"/>
                    </svg>
                    <span>XNOR</span>
                </div>
            </div>
        </aside>

        <section id="canvas-container">
            <svg id="svg-layer"></svg>
            <div id="gates-layer"></div>
        </section>

        <aside id="truth-panel">
            <h2>Truth Table</h2>
            <div class="truth-controls">
                <button id="btn-generate-table">Generate Full Table</button>
                <button id="btn-clear-table">Clear Table</button>
            </div>
            <div id="truth-table-container">
                <table id="truth-table">
                    <thead id="truth-thead"></thead>
                    <tbody id="truth-tbody"></tbody>
                </table>
            </div>
        </aside>
    </main>

    <footer id="status-bar">
        <div id="status-outputs"></div>
    </footer>

    <div id="cycle-warning" class="warning-banner">⚠ Cycle detected in circuit!</div>

    <script src="js/gate.js"></script>
    <script src="js/wire.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/truthtable.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
